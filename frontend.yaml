- name: setup frontend server
  hosts: frontend
  become: yes

  tasks:
    - name: install nginx
      ansible.builtin.package:
        name: nginx
        state: present
    
    - name: remove html directory
      ansible.builtin.file:
        path: /usr/share/nginx/html/
        state: absent

    - name: create html directory
      ansible.builtin.file:
        path: /usr/share/nginx/html/
        state: directory

    - name: download frontend application
      ansible.builtin.get_url:
        url: https://expense-joindevops.s3.us-east-1.amazonaws.com/expense-frontend-v2.zip
        dest: /tmp/frontend.zip

    - name: extract frontend application
      ansible.builtin.unarchive:
        src: /tmp/frontend.zip
        dest: /usr/share/nginx/html/
        remote_src: yes

    - name: remove default content in nginx
      ansible.builtin.file:
        state: absent
        path: /etc/nginx/default.d/expense.conf

    - name: copy the expense app content
      ansible.builtin.copy:
        src: expense.conf
        dest: /etc/nginx/default.d/expense.conf

    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
        enabled: yes
     
  
    