- name: create ec2 instance and r53 records
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0b4e76942b2d30254
    zone_id: Z09495672QZRP76BIQQBH
    domain_name: "daws-86s.space"
    instances:
    - mysql
    - backend
    - frontend

  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      image_id: "{{ ami_id }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      tags:
        Name: "{{ item }}"

    loop: "{{ instances }}"
    register: ec2_output

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{item.item}}.{{ domain_name }}"
      type: A 
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"

  - name: create r53 record for frontend
    amazon.aws.route53:
    state: present
    zone: "{{ domain_name }}"
    record: "{{ domain_name }}"
    type: A 
    ttl: 1
    value: "{{ item.instance[0].public_ip_address }}"
    overwrite: true
  when: item.item == "frontend"
  loop: "{{ ec2_output.results }}"